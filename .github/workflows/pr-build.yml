name: PR Build

on:
  pull_request:
    branches: [dev]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      mods: ${{ steps.detect.outputs.mods }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          mods=$(python3 Scripts/detect_changed_mods.py --base origin/${{ github.base_ref }} --head HEAD)
          echo "mods=$mods" >> "$GITHUB_OUTPUT"
          if [ "$mods" = "[]" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed mods: $mods"

  build:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mod: ${{ fromJSON(needs.detect.outputs.mods) }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate
        run: python3 Scripts/validate_mod.py "${{ matrix.mod }}"
      - name: Build
        run: python3 Scripts/build_mod.py "${{ matrix.mod }}" --out ./dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mod }}-pr${{ github.event.pull_request.number }}
          path: ./dist/*.vmz
          retention-days: 14

name: Open Release PR

on:
  workflow_dispatch:
    inputs:
      mod_id:
        description: "Mod id (matches the `id=` field in mod.txt, e.g. quick-exit)"
        required: true
        type: string
      bump:
        description: "Semver bump (ignored if `version` is set)"
        required: false
        type: choice
        default: patch
        options: [patch, minor, major]
      version:
        description: "Explicit version (e.g. 1.2.3). Overrides `bump` when set."
        required: false
        type: string

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Resolve mod folder
        id: mod
        run: |
          MOD_ID="${{ inputs.mod_id }}" python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, sys
          sys.path.insert(0, "Scripts")
          from modlib import find_mod_by_id
          m = find_mod_by_id(os.environ["MOD_ID"])
          print(f"folder={m.folder_name}")
          print(f"name={m.name}")
          PY

      - name: Compute next version
        id: version
        env:
          MOD_ID: ${{ inputs.mod_id }}
          BUMP: ${{ inputs.bump }}
          EXPLICIT: ${{ inputs.version }}
        run: |
          if [ -n "$EXPLICIT" ]; then
            echo "new=$EXPLICIT" >> "$GITHUB_OUTPUT"
            echo "last=(explicit)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --tags --quiet
          last=$(git tag --list "${MOD_ID}-v*" --sort=-v:refname | head -n1)
          if [ -z "$last" ]; then
            base="0.0.0"
          else
            base="${last#${MOD_ID}-v}"
          fi
          IFS=. read -r MAJ MIN PAT <<EOF
          $base
          EOF
          case "$BUMP" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch|*) PAT=$((PAT+1)) ;;
          esac
          new="${MAJ}.${MIN}.${PAT}"
          echo "last=${last:-none}" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Build changelog
        id: changelog
        env:
          FOLDER: ${{ steps.mod.outputs.folder }}
          LAST: ${{ steps.version.outputs.last }}
        run: |
          if [ "$LAST" = "none" ] || [ "$LAST" = "(explicit)" ]; then
            range=""
          else
            range="${LAST}..HEAD"
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            if [ -z "$range" ]; then
              git log --pretty="- %s (%h)" -- "$FOLDER" | head -n 50
            else
              git log "$range" --pretty="- %s (%h)" -- "$FOLDER" | head -n 50
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release branch
        env:
          MOD_ID: ${{ inputs.mod_id }}
          NEW: ${{ steps.version.outputs.new }}
        run: |
          branch="release/${MOD_ID}-v${NEW}"
          git checkout -b "$branch"
          git push --force-with-lease origin "$branch"
          echo "RELEASE_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOD_ID: ${{ inputs.mod_id }}
          MOD_NAME: ${{ steps.mod.outputs.name }}
          NEW: ${{ steps.version.outputs.new }}
          TAG: ${{ inputs.mod_id }}-v${{ steps.version.outputs.new }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          BRANCH: ${{ env.RELEASE_BRANCH }}
        run: |
          body=$(cat <<EOF
          Release **${MOD_NAME}** at version **${NEW}**.

          On merge, an auto-tag workflow will push the tag \`${TAG}\`, which triggers the release pipeline (builds the \`.vmz\`, publishes a GitHub Release, posts a ModWorkshop upload checklist).

          ## Changelog

          ${CHANGELOG:-_(no commits touched this mod since last tag)_}

          ## Release checklist

          - [ ] Changelog above is accurate
          - [ ] No unrelated changes piggy-backing on this release
          - [ ] ModWorkshop page is ready to receive the new \`.vmz\` (or the mod has no MW page yet)
          EOF
          )
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release: ${MOD_ID} v${NEW}" \
            --body "$body"
